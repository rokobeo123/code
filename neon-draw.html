<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>✦ NEON DRAW — Vẽ Neon bằng ngón tay</title>
<meta name="description" content="Ứng dụng vẽ neon bằng ngón tay qua camera với hiệu ứng phát sáng bốc cháy">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Inter',sans-serif;user-select:none}

/* ── Video ── */
#video{position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;opacity:.55;transform:scaleX(-1);z-index:1}

/* ── p5 Canvas Container ── */
#p5-container{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:2}
#p5-container canvas{display:block}

/* ── Loading Overlay ── */
#loading{position:fixed;inset:0;z-index:9999;background:rgba(5,5,18,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;transition:opacity .6s}
#loading.hidden{opacity:0;pointer-events:none}
.spinner{width:60px;height:60px;border:3px solid rgba(0,245,255,.15);border-top-color:#00f5ff;border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-family:'Orbitron',sans-serif;color:#00f5ff;font-size:14px;letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 18px rgba(0,245,255,.5)}

/* ── Top Bar ── */
#top-bar{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:14px;padding:10px 28px;background:rgba(15,15,35,.45);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:50px;box-shadow:0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06)}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:17px;background:linear-gradient(135deg,#00f5ff,#ff00ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;white-space:nowrap;text-shadow:none;filter:drop-shadow(0 0 8px rgba(0,245,255,.3))}
.top-sep{width:1px;height:24px;background:rgba(255,255,255,.12)}
.top-btn{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:1.5px;padding:7px 16px;border:1px solid rgba(255,255,255,.15);border-radius:30px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.75);cursor:pointer;transition:all .25s;white-space:nowrap}
.top-btn:hover{background:rgba(0,245,255,.15);border-color:rgba(0,245,255,.4);color:#00f5ff;box-shadow:0 0 16px rgba(0,245,255,.2)}
.top-btn.danger:hover{background:rgba(255,0,255,.15);border-color:rgba(255,0,255,.4);color:#ff00ff;box-shadow:0 0 16px rgba(255,0,255,.2)}

/* ── Color Taskbar (Win11 style, vertical right) ── */
#color-taskbar{position:fixed;right:12px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;align-items:center;padding:10px 7px;gap:5px;background:rgba(20,20,45,.52);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,.1);border-radius:18px;box-shadow:0 8px 36px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.05)}
.swatch-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:12px;transition:background .2s}
.swatch-wrap:hover,.swatch-wrap.hovered{background:rgba(255,255,255,.08)}
.swatch-dot{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,.12);transition:all .25s;box-shadow:none}
.swatch-wrap.active .swatch-dot{border-color:rgba(255,255,255,.85);transform:scale(1.15);box-shadow:0 0 14px var(--sw-color)}
/* Active indicator line (Win11 style) */
.swatch-wrap.active::before{content:'';position:absolute;left:-2px;top:50%;transform:translateY(-50%);width:3px;height:16px;border-radius:2px;background:var(--sw-color);box-shadow:0 0 8px var(--sw-color)}
.taskbar-label{font-family:'Orbitron',sans-serif;font-size:7px;color:rgba(255,255,255,.35);letter-spacing:1.5px;text-transform:uppercase;writing-mode:vertical-lr;text-orientation:mixed;margin-top:4px;padding-top:6px;border-top:1px solid rgba(255,255,255,.08)}

/* ── Size Zone (left) ── */
#size-zone{position:fixed;left:0;top:0;width:70px;height:100vh;z-index:99;pointer-events:none;display:flex;align-items:center;justify-content:center}
#size-track{width:3px;height:calc(100vh - 180px);background:rgba(255,255,255,.06);border-radius:2px;position:relative}
#size-label{position:fixed;left:14px;top:50%;transform:translateY(-50%) rotate(-90deg);font-family:'Orbitron',sans-serif;font-size:8px;color:rgba(255,255,255,.2);letter-spacing:3px;text-transform:uppercase;white-space:nowrap}

/* ── Status Bar ── */
#status-bar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:100;font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:2px;color:#00f5ff;text-shadow:0 0 14px currentColor;padding:8px 24px;background:rgba(10,10,30,.4);backdrop-filter:blur(12px);border-radius:30px;border:1px solid rgba(255,255,255,.06);transition:color .3s,text-shadow .3s;white-space:nowrap}

/* ── Help Tips ── */
#help-tips{position:fixed;bottom:16px;right:16px;z-index:100;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.help-line{font-family:'Inter',sans-serif;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.5px;transition:color .3s}
.help-line span{opacity:.6}

/* ── Animations ── */
@keyframes pulse-glow{0%,100%{box-shadow:0 0 8px var(--sw-color)}50%{box-shadow:0 0 22px var(--sw-color),0 0 44px var(--sw-color)}}
.swatch-wrap.just-selected .swatch-dot{animation:pulse-glow .5s ease-out}
</style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading">
  <div class="spinner"></div>
  <p>Đang khởi động camera...</p>
</div>

<!-- Camera -->
<video id="video" playsinline autoplay muted></video>

<!-- p5 Canvas -->
<div id="p5-container"></div>

<!-- Top Bar -->
<div id="top-bar">
  <div class="logo">✦ NEON DRAW</div>
  <div class="top-sep"></div>
  <button class="top-btn" id="btn-undo" onclick="undoStroke()">↩ UNDO</button>
  <button class="top-btn danger" id="btn-clear" onclick="clearAll()">✕ XÓA</button>
</div>

<!-- Size Zone -->
<div id="size-zone"><div id="size-track"></div></div>
<div id="size-label">SIZE</div>

<!-- Color Taskbar -->
<div id="color-taskbar"></div>

<!-- Status Bar -->
<div id="status-bar">👆 Đưa tay vào camera</div>

<!-- Help Tips -->
<div id="help-tips">
  <div class="help-line">☝️ <span>Trỏ = Vẽ</span></div>
  <div class="help-line">🤏 <span>Kẹp = Di chuyển</span></div>
  <div class="help-line">✊→🖐 <span>Nắm→Xòe = Phá vỡ</span></div>
  <div class="help-line">◀ <span>Trái = Cỡ nét</span></div>
  <div class="help-line">▶ <span>Phải = Chọn màu</span></div>
</div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

<script>
/* ═══════════════════════════════════════════════════════════
   SECTION 1 — CONSTANTS
   ═══════════════════════════════════════════════════════════ */
const PALETTE = ['#00f5ff','#ff00ff','#ff6600','#00ff88','#ffff00','#ff1177','#aa44ff','#ff4400','#ffffff'];
const SIZE_MIN = 2, SIZE_MAX = 22;
const DWELL_MS = 480;
const PINCH_NORM = 0.06;      // normalized pinch threshold
const GRAB_PX   = 55;         // grab proximity in px
const ZONE_W    = 70;         // side zone width

/* ═══════════════════════════════════════════════════════════
   SECTION 2 — GLOBAL STATE
   ═══════════════════════════════════════════════════════════ */
let brushSize  = 6;
let brushColor = PALETTE[0];
let strokes      = [];   // completed: {points:[], color, size}
let activeStrokes = {};  // key = hand label
let sparks  = [];
let shards  = [];
let handResults  = [];
let handStates   = {};   // key = hand label
let bgLayer;             // p5.Graphics
let W, H;
let needRedrawBg = false;
let cameraReady  = false;
let _p5;                 // p5 instance ref

/* ═══════════════════════════════════════════════════════════
   SECTION 3 — UTILITIES
   ═══════════════════════════════════════════════════════════ */
function toC(pt){ return {x: pt.x * W, y: pt.y * H}; }
function d2(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function hexRGB(hex){
  return {r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16)};
}
function getHS(label){
  if(!handStates[label]) handStates[label] = {wasFist:false, dwellIdx:-1, dwellStart:0, grabbed:-1, prevPinch:null, wasDrawing:false};
  return handStates[label];
}

/* ═══════════════════════════════════════════════════════════
   SECTION 4 — BUILD COLOR TASKBAR (Win11 style)
   ═══════════════════════════════════════════════════════════ */
(function buildTaskbar(){
  const bar = document.getElementById('color-taskbar');
  PALETTE.forEach((c,i)=>{
    const wrap = document.createElement('div');
    wrap.className = 'swatch-wrap' + (i===0?' active':'');
    wrap.id = 'sw-'+i;
    wrap.style.setProperty('--sw-color', c);
    const dot = document.createElement('div');
    dot.className = 'swatch-dot';
    dot.style.backgroundColor = c;
    wrap.appendChild(dot);
    bar.appendChild(wrap);
  });
  const lbl = document.createElement('div');
  lbl.className = 'taskbar-label';
  lbl.textContent = 'COLOR';
  bar.appendChild(lbl);
})();

/* ═══════════════════════════════════════════════════════════
   SECTION 5 — MEDIAPIPE HANDS
   ═══════════════════════════════════════════════════════════ */
const hands = new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:2, modelComplexity:1, minDetectionConfidence:0.75, minTrackingConfidence:0.7});
hands.onResults(r=>{
  handResults = [];
  if(r.multiHandLandmarks){
    for(let i=0;i<r.multiHandLandmarks.length;i++){
      handResults.push({lm:r.multiHandLandmarks[i], hd:r.multiHandedness[i]});
    }
  }
});

/* ═══════════════════════════════════════════════════════════
   SECTION 6 — CAMERA
   ═══════════════════════════════════════════════════════════ */
const video = document.getElementById('video');
navigator.mediaDevices.getUserMedia({video:{width:1280,height:720,facingMode:'user'}})
.then(s=>{
  video.srcObject = s;
  video.onloadeddata = ()=>{ cameraReady = true; document.getElementById('loading').classList.add('hidden'); processFrame(); };
})
.catch(e=>{
  document.getElementById('loading').innerHTML = '<p style="color:#ff4466">⚠ Camera Error: '+e.message+'</p>';
});
function processFrame(){
  if(!cameraReady) return;
  hands.send({image:video}).then(()=> requestAnimationFrame(processFrame));
}

/* ═══════════════════════════════════════════════════════════
   SECTION 7 — GESTURE ANALYSIS
   ═══════════════════════════════════════════════════════════ */
function analyzeHand(rawLm){
  // mirror x
  const lm = rawLm.map(p=>({x:1-p.x, y:p.y, z:p.z}));
  const indexExt  = lm[8].y  < lm[6].y;
  const middleExt = lm[12].y < lm[10].y;
  const ringExt   = lm[16].y < lm[14].y;
  const pinkyExt  = lm[20].y < lm[18].y;
  const palmRef   = lm[9];
  const thumbExt  = d2(lm[4],palmRef) > d2(lm[3],palmRef)*1.15;
  const pinchDist = d2(lm[4],lm[8]);
  return {
    lm,
    indexTip:   toC(lm[8]),
    pinchCenter:toC({x:(lm[4].x+lm[8].x)/2, y:(lm[4].y+lm[8].y)/2}),
    pinchDist,
    isDrawing:  indexExt && !middleExt,
    isPinching: pinchDist < PINCH_NORM,
    isFist:     !indexExt && !middleExt && !ringExt && !pinkyExt && !thumbExt,
    isOpen5:    indexExt && middleExt && ringExt && pinkyExt && thumbExt,
    indexExt, middleExt
  };
}

/* ═══════════════════════════════════════════════════════════
   SECTION 8 — ACTIONS
   ═══════════════════════════════════════════════════════════ */
function undoStroke(){
  if(strokes.length){ strokes.pop(); needRedrawBg = true; }
}
function clearAll(){
  strokes = []; activeStrokes = {}; if(bgLayer) bgLayer.clear();
}
function triggerShatter(p){
  for(const s of strokes){
    const step = Math.max(1, Math.floor(s.points.length/40));
    for(let i=0;i<s.points.length;i+=step) shards.push(new Shard(p, s.points[i].x, s.points[i].y, s.color));
  }
  strokes = []; activeStrokes = {};
  if(bgLayer) bgLayer.clear();
}
function redrawBgLayer(p){
  bgLayer.clear();
  for(const s of strokes){
    for(let i=1;i<s.points.length;i++) neonLine(bgLayer, s.points[i-1].x,s.points[i-1].y, s.points[i].x,s.points[i].y, s.color, s.size, p);
  }
}

/* ═══════════════════════════════════════════════════════════
   SECTION 9 — SOLID LINE (no glow)
   ═══════════════════════════════════════════════════════════ */
function neonLine(gfx, x1,y1,x2,y2, col, sz, p){
  const c = hexRGB(col);
  gfx.strokeCap(p.ROUND);
  gfx.noFill();
  gfx.stroke(c.r,c.g,c.b,240);
  gfx.strokeWeight(sz);
  gfx.line(x1,y1,x2,y2);
}

/* ═══════════════════════════════════════════════════════════
   SECTION 10 — PARTICLE CLASSES
   ═══════════════════════════════════════════════════════════ */
class Spark {
  constructor(p,x,y,col){
    this.x=x; this.y=y;
    this.vx=p.random(-2.8,2.8);
    this.vy=p.random(-5.5,-1);
    this.life=1; this.col=col;
    this.sz=p.random(2,6.5);
  }
  update(){ this.x+=this.vx; this.vy+=0.13; this.y+=this.vy; this.life-=0.028; }
  draw(p){
    if(this.life<=0) return;
    const c=hexRGB(this.col); p.noStroke();
    p.fill(c.r,c.g,c.b,this.life*35); p.ellipse(this.x,this.y,this.sz*3.5*this.life);
    p.fill(c.r,c.g,c.b,this.life*190); p.ellipse(this.x,this.y,this.sz*this.life);
    p.fill(255,255,255,this.life*140); p.ellipse(this.x,this.y,this.sz*0.35*this.life);
  }
  isDead(){ return this.life<=0; }
}

class Shard {
  constructor(p,x,y,col){
    this.x=x; this.y=y;
    this.vx=p.random(-7,7); this.vy=p.random(-11,3);
    this.rot=p.random(p.TWO_PI); this.rs=p.random(-0.15,0.15);
    this.life=1; this.col=col; this.sz=p.random(5,16);
    this.verts=[];
    const sides=p.floor(p.random(3,6));
    for(let i=0;i<sides;i++){
      const a=(p.TWO_PI/sides)*i+p.random(-0.4,0.4), r=p.random(0.5,1.3);
      this.verts.push({x:Math.cos(a)*r, y:Math.sin(a)*r});
    }
  }
  update(){ this.x+=this.vx; this.vy+=0.19; this.y+=this.vy; this.rot+=this.rs; this.life-=0.013; this.vx*=0.99; }
  draw(p){
    if(this.life<=0) return;
    const c=hexRGB(this.col);
    p.push(); p.translate(this.x,this.y); p.rotate(this.rot); p.noStroke();
    const layers=[{s:2.5,a:22},{s:1.5,a:65},{s:1,a:185}];
    for(const l of layers){
      p.fill(c.r,c.g,c.b,this.life*l.a);
      p.beginShape(); for(const v of this.verts) p.vertex(v.x*this.sz*l.s, v.y*this.sz*l.s); p.endShape(p.CLOSE);
    }
    p.fill(255,255,255,this.life*90);
    p.beginShape(); for(const v of this.verts) p.vertex(v.x*this.sz*0.45, v.y*this.sz*0.45); p.endShape(p.CLOSE);
    p.pop();
  }
  isDead(){ return this.life<=0; }
}

/* ═══════════════════════════════════════════════════════════
   SECTION 11 — p5.js SKETCH (instance mode)
   ═══════════════════════════════════════════════════════════ */
new p5(function(p){
  _p5 = p;

  p.setup = function(){
    W = window.innerWidth; H = window.innerHeight;
    const cnv = p.createCanvas(W,H);
    cnv.parent('p5-container');
    cnv.style('pointer-events','none');
    bgLayer = p.createGraphics(W,H);
    bgLayer.clear();
    p.pixelDensity(1);
    p.textFont('Orbitron');
  };

  p.draw = function(){
    p.clear();

    // Redraw bgLayer if needed
    if(needRedrawBg){ redrawBgLayer(p); needRedrawBg=false; }
    p.image(bgLayer,0,0);

    // Track which hand labels are active this frame
    const activeLabels = new Set();
    const statusParts = [];

    /* ── Process each detected hand ── */
    for(let hi=0; hi<handResults.length; hi++){
      const hr = handResults[hi];
      const label = hr.hd.label; // 'Left' or 'Right'
      activeLabels.add(label);
      const a = analyzeHand(hr.lm);
      const hs = getHS(label);
      const {indexTip, pinchCenter, isDrawing, isPinching, isFist, isOpen5} = a;

      const inSizeZone  = indexTip.x < ZONE_W;
      const inColorZone = indexTip.x > W - ZONE_W;
      const inDrawZone  = !inSizeZone && !inColorZone;

      /* ── SIZE ZONE (left) ── */
      if(inSizeZone && a.indexExt){
        const t = p.constrain(indexTip.y / H, 0.05, 0.95);
        brushSize = p.lerp(SIZE_MIN, SIZE_MAX, t);
        // visual knob
        const cr = hexRGB(brushColor);
        p.noFill(); p.stroke(cr.r,cr.g,cr.b,100); p.strokeWeight(2);
        p.ellipse(35, indexTip.y, brushSize*3);
        p.fill(cr.r,cr.g,cr.b,60); p.noStroke();
        p.ellipse(35, indexTip.y, brushSize*1.5);
        p.fill(255,255,255,160); p.textSize(10); p.textAlign(p.CENTER,p.CENTER);
        p.text(Math.round(brushSize), 35, indexTip.y - brushSize*2 - 10);
        // track highlight
        p.stroke(cr.r,cr.g,cr.b,40); p.strokeWeight(3);
        p.line(35, 90, 35, indexTip.y);
        statusParts.push('📏 Cỡ nét: '+Math.round(brushSize));
      }

      /* ── COLOR ZONE (right) ── */
      if(inColorZone && a.indexExt){
        let hovIdx = -1;
        for(let ci=0;ci<PALETTE.length;ci++){
          const el = document.getElementById('sw-'+ci);
          if(!el) continue;
          const r = el.getBoundingClientRect();
          const cy = r.top + r.height/2;
          if(Math.abs(indexTip.y - cy) < 22 && indexTip.x > r.left - 20){ hovIdx=ci; break; }
        }
        // update hover class
        document.querySelectorAll('.swatch-wrap').forEach((s,i)=> s.classList.toggle('hovered', i===hovIdx));

        if(hovIdx >= 0){
          if(hs.dwellIdx === hovIdx){
            const elapsed = Date.now() - hs.dwellStart;
            const prog = Math.min(elapsed / DWELL_MS, 1);
            // draw progress arc
            const el = document.getElementById('sw-'+hovIdx);
            const r = el.getBoundingClientRect();
            const cx = r.left + r.width/2, cy = r.top + r.height/2;
            const cc = hexRGB(PALETTE[hovIdx]);
            p.noFill();
            // glow ring
            p.stroke(cc.r,cc.g,cc.b,50); p.strokeWeight(8);
            p.arc(cx,cy,46,46,-p.HALF_PI,-p.HALF_PI+prog*p.TWO_PI);
            // progress arc
            p.stroke(cc.r,cc.g,cc.b,220); p.strokeWeight(3);
            p.arc(cx,cy,42,42,-p.HALF_PI,-p.HALF_PI+prog*p.TWO_PI);

            if(prog>=1){
              brushColor = PALETTE[hovIdx];
              document.querySelectorAll('.swatch-wrap').forEach(s=>{s.classList.remove('active');s.classList.remove('just-selected');});
              el.classList.add('active','just-selected');
              setTimeout(()=>el.classList.remove('just-selected'),600);
              hs.dwellIdx = -1;
              statusParts.push('🎨 Đã chọn màu!');
            }
          } else {
            hs.dwellIdx = hovIdx; hs.dwellStart = Date.now();
          }
        } else { hs.dwellIdx = -1; }
        statusParts.push('🎨 Giữ ngón để chọn màu');
      } else {
        hs.dwellIdx = -1;
        document.querySelectorAll('.swatch-wrap').forEach(s=> s.classList.remove('hovered'));
      }

      /* ── DRAWING ── */
      if(isDrawing && inDrawZone && !isPinching){
        if(!activeStrokes[label]) activeStrokes[label] = {points:[], color:brushColor, size:brushSize};
        const st = activeStrokes[label];
        const last = st.points.length ? st.points[st.points.length-1] : null;
        if(!last || d2(indexTip, last)>2){
          st.points.push({x:indexTip.x, y:indexTip.y});
          // draw segment on bgLayer
          if(st.points.length>1){
            const prev = st.points[st.points.length-2];
            neonLine(bgLayer, prev.x,prev.y, indexTip.x,indexTip.y, st.color, st.size, p);
            // sparks
            if(p.random()<0.45) sparks.push(new Spark(p, indexTip.x, indexTip.y, st.color));
          }
        }
        // cursor glow
        const cr = hexRGB(brushColor);
        p.noStroke(); p.fill(cr.r,cr.g,cr.b,70); p.ellipse(indexTip.x,indexTip.y,brushSize*4.5);
        p.fill(cr.r,cr.g,cr.b,180); p.ellipse(indexTip.x,indexTip.y,brushSize*1.6);
        p.fill(255,255,255,200); p.ellipse(indexTip.x,indexTip.y,brushSize*0.4);
        hs.wasDrawing = true;
        statusParts.push('✏️ Đang vẽ...');
      } else {
        // finalize stroke if was drawing
        if(activeStrokes[label] && activeStrokes[label].points.length>1){
          strokes.push(activeStrokes[label]);
        }
        delete activeStrokes[label];
        hs.wasDrawing = false;
      }

      /* ── PINCH TO MOVE ── */
      if(isPinching && inDrawZone && !isDrawing){
        if(hs.grabbed < 0){
          let minD = GRAB_PX, near = -1;
          for(let si=0;si<strokes.length;si++){
            for(const pt of strokes[si].points){
              const dd = d2(pinchCenter, pt);
              if(dd<minD){ minD=dd; near=si; }
            }
          }
          if(near>=0){ hs.grabbed=near; hs.prevPinch={x:pinchCenter.x,y:pinchCenter.y}; }
        }
        if(hs.grabbed>=0 && hs.prevPinch && strokes[hs.grabbed]){
          const dx=pinchCenter.x-hs.prevPinch.x, dy=pinchCenter.y-hs.prevPinch.y;
          for(const pt of strokes[hs.grabbed].points){ pt.x+=dx; pt.y+=dy; }
          hs.prevPinch={x:pinchCenter.x,y:pinchCenter.y};
          needRedrawBg = true;
        }
        // visual
        p.noFill(); p.stroke(255,200,0,140); p.strokeWeight(2);
        p.ellipse(pinchCenter.x,pinchCenter.y,32);
        p.stroke(255,200,0,40); p.strokeWeight(6);
        p.ellipse(pinchCenter.x,pinchCenter.y,36);
        statusParts.push('🤏 Di chuyển nét');
      } else {
        hs.grabbed = -1; hs.prevPinch = null;
      }

      /* ── SHATTER: fist → open5 ── */
      if(isFist){
        hs.wasFist = true;
        statusParts.push('✊ NẮM TAY — XÒE RA ĐỂ PHÁ VỠ!');
      }
      if(hs.wasFist && isOpen5){
        triggerShatter(p);
        hs.wasFist = false;
      }
      if(!isFist && !isOpen5 && !hs.wasFist){
        // neutral — do nothing
      }

      /* ── Finger cursor (neutral) ── */
      if(!isDrawing && !isPinching && !inSizeZone && !inColorZone){
        p.noStroke(); p.fill(255,255,255,55); p.ellipse(indexTip.x,indexTip.y,14);
        p.fill(255,255,255,130); p.ellipse(indexTip.x,indexTip.y,5);
      }
    }

    /* ── Finalize strokes for hands that disappeared ── */
    for(const label in activeStrokes){
      if(!activeLabels.has(label)){
        if(activeStrokes[label].points.length>1) strokes.push(activeStrokes[label]);
        delete activeStrokes[label];
      }
    }

    /* ── Update & draw sparks ── */
    for(let i=sparks.length-1;i>=0;i--){
      sparks[i].update(); sparks[i].draw(p);
      if(sparks[i].isDead()) sparks.splice(i,1);
    }

    /* ── Update & draw shards ── */
    for(let i=shards.length-1;i>=0;i--){
      shards[i].update(); shards[i].draw(p);
      if(shards[i].isDead()) shards.splice(i,1);
    }

    /* ── Draw size zone track ── */
    drawSizeZone(p);

    /* ── Status bar ── */
    updateStatus(statusParts);
  };

  function drawSizeZone(p){
    const x = 35, top=90, bot=H-90;
    // track line
    p.stroke(255,255,255,20); p.strokeWeight(2); p.noFill();
    p.line(x, top, x, bot);
    // tick marks
    for(let i=0;i<=4;i++){
      const y = p.lerp(top, bot, i/4);
      p.stroke(255,255,255,15); p.strokeWeight(1);
      p.line(x-6,y,x+6,y);
    }
    // knob position
    const t = (brushSize - SIZE_MIN)/(SIZE_MAX - SIZE_MIN);
    const ky = p.lerp(top, bot, t);
    const cr = hexRGB(brushColor);
    p.noStroke();
    p.fill(cr.r,cr.g,cr.b,30); p.ellipse(x,ky,24);
    p.fill(cr.r,cr.g,cr.b,150); p.ellipse(x,ky,10);
    p.fill(255,255,255,180); p.ellipse(x,ky,4);
  }

  p.windowResized = function(){
    W=window.innerWidth; H=window.innerHeight;
    p.resizeCanvas(W,H);
    bgLayer = p.createGraphics(W,H);
    bgLayer.clear();
    needRedrawBg = true;
  };
},'p5-container');

/* ═══════════════════════════════════════════════════════════
   SECTION 12 — STATUS BAR UPDATE
   ═══════════════════════════════════════════════════════════ */
function updateStatus(parts){
  const el = document.getElementById('status-bar');
  if(parts.length>0){
    // priority: shatter > move > draw > size > color
    const priority = ['✊','🤏','✏️','📏','🎨'];
    let chosen = parts[0];
    for(const p of priority){ const f=parts.find(s=>s.includes(p)); if(f){chosen=f;break;} }
    el.textContent = chosen;
    if(chosen.includes('✊'))      el.style.color='#ff4400';
    else if(chosen.includes('🤏')) el.style.color='#ffcc00';
    else if(chosen.includes('✏️')) el.style.color=brushColor;
    else if(chosen.includes('📏')) el.style.color='#00f5ff';
    else                           el.style.color=brushColor;
    el.style.textShadow='0 0 14px currentColor';
  } else if(handResults.length>0){
    el.textContent='✋ Sẵn sàng vẽ'; el.style.color='#00f5ff';
  } else {
    el.textContent='👆 Đưa tay vào camera'; el.style.color='#666';
  }
}
</script>
