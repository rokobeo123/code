<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Neon Draw</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <!-- Required CDNs: p5.js and MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" defer></script>

  <style>
    :root{--accent:#7c3aed;--bg:#05060a;color-scheme:dark}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}
    body{background:linear-gradient(180deg,#02040a 0%, #07102a 100%);color:#e6eef8;overflow:hidden}

    /* Top bar */
    .topbar{position:fixed;left:0;right:0;top:0;height:56px;display:flex;align-items:center;gap:12px;padding:0 14px;background:linear-gradient(90deg,rgba(255,255,255,0.03),transparent);backdrop-filter:blur(6px);z-index:30}
    .brand{font-weight:700;color:var(--accent)}

    /* Fullscreen camera/video + transparent canvas container */
    .stage{position:fixed;inset:56px 0 48px 0;display:flex;align-items:center;justify-content:center}
    video#camera{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;transform:scaleX(-1);transform-origin:center center}
    .canvas-wrap{position:relative;width:100%;height:100%}
    #draw{position:absolute;inset:0;width:100%;height:100%;background:transparent;transform:scaleX(-1);transform-origin:center center}

    /* Bottom status */
    .statusbar{position:fixed;left:0;right:0;bottom:0;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:linear-gradient(90deg,transparent,rgba(0,0,0,0.25));z-index:30}

    /* Loading overlay */
    .loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(0,0,0,0.6),rgba(1,1,1,0.4));z-index:40}
    .loader{width:64px;height:64px;border-radius:50%;box-shadow:0 0 32px var(--accent);display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.6))}
    .loader:after{content:"";width:28px;height:28px;border-radius:50%;border:3px solid rgba(255,255,255,0.12);border-top-color:var(--accent);animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Help tips */
    .help{position:fixed;right:14px;top:72px;width:260px;background:rgba(10,12,20,0.6);padding:10px;border-radius:8px;font-size:13px;backdrop-filter:blur(6px);z-index:35}
    .help h4{margin:0 0 6px 0;font-size:13px;color:var(--accent)}
    .muted{opacity:0.9;color:#bcd3ff;font-size:13px}

    /* Small responsive tweaks */
    @media (max-width:520px){.help{display:none}.topbar{padding:0 10px}}
  </style>
</head>
<body>
  <div class="topbar" role="banner">
    <div class="brand">Neon Draw</div>
    <div class="muted">single-file shell • camera & canvas</div>
  </div>

  <main class="stage" id="stage">
    <!-- Camera feed (will request permission when used) -->
    <video id="camera" autoplay playsinline muted></video>

    <!-- Transparent drawing canvas container -->
    <div class="canvas-wrap">
      <div id="draw"></div>
    </div>
  </main>

  <div class="statusbar" role="status">
    <div class="muted" id="status-left">Status: idle</div>
    <div class="muted" id="status-right">Help: press ?</div>
  </div>

  <aside class="help" aria-hidden="false">
    <h4>Quick tips</h4>
    <div class="muted">• Allow camera to see live video behind the canvas.</div>
    <div class="muted">• Draw will be rendered on a transparent canvas overlay.</div>
    <div class="muted">• This is a shell for later tasks; no drawing logic yet.</div>
  </aside>

  <div class="loading" id="loading" aria-hidden="false">
    <div class="loader" aria-hidden="true"></div>
  </div>

  <script>
    // p5 + camera bootstrap for Task 3: gestures, drawing, swatches
    let video, hands, bgLayer;

    // Step 1 helpers
    const SWATCHES = ['#00f5ff','#ff00ff','#ff6600','#00ff88','#ffff00','#ff1177','#aa44ff','#ff4400','#ffffff'];
    // Centralized swatch layout constants (used for drawing and hit-testing)
    const SWATCH_SIZE = 44, SWATCH_GAP = 12, SWATCH_LEFT = 12, SWATCH_TOP = 80;
    const SWATCH_DWELL = 480; // ms
    // Stroke sizing and id counter (monotonic)
    const DEFAULT_STROKE_SIZE = 16;
    const PINCH_THRESHOLD = 48; // px
    let STROKE_COUNTER = 1;
    function toC(pt){
      // Prefer actual video frame size (MediaPipe frames) to avoid early-frame scaling issues,
      // then p5 instance size, then stage element size, then window size as a last resort.
      const cam = document.getElementById('camera');
      const stageEl = document.getElementById('stage');
      const w = (cam && cam.videoWidth) ? cam.videoWidth : (window._neonP5 && window._neonP5.width) ? window._neonP5.width : (stageEl ? stageEl.clientWidth : window.innerWidth);
      const h = (cam && cam.videoHeight) ? cam.videoHeight : (window._neonP5 && window._neonP5.height) ? window._neonP5.height : (stageEl ? stageEl.clientHeight : window.innerHeight);
      return { x: pt.x * w, y: pt.y * h };
    }

    (function(){
      window.neon = { ready: false };

      function hideLoading(){ const l = document.getElementById('loading'); if(!l) return; l.style.display = 'none'; l.setAttribute('aria-hidden','true'); }
      function showLoading(){ const l = document.getElementById('loading'); if(!l) return; l.style.display = 'flex'; l.setAttribute('aria-hidden','false'); }

      // State: strokes and hands
      const strokes = []; // {id,color,size,points:[{x,y}], hand}
      const activeStrokes = {}; // handId -> stroke
      let activeColor = SWATCHES[0];

      // Per-hand state store
      const handsState = {}; // key by label 'Left'/'Right'

      function fitCanvas(){ const rect = document.getElementById('stage'); if(!rect || !window._neonP5) return; window._neonP5.resizeCanvas(Math.max(300, Math.floor(rect.clientWidth)), Math.max(200, Math.floor(rect.clientHeight))); }
      const stage = document.getElementById('stage'); if(stage){ new ResizeObserver(fitCanvas).observe(stage); }
      fitCanvas();

      // Drawing helpers
      // Neon line helper: four-layer glow + core
      function neonLine(gfx, x1, y1, x2, y2, col, sz){
        // outermost soft glow
        gfx.push();
        gfx.stroke(colorWithAlpha(col,0.06)); gfx.strokeWeight(sz*6); gfx.line(x1,y1,x2,y2);
        // secondary glow
        gfx.stroke(colorWithAlpha(col,0.12)); gfx.strokeWeight(sz*3); gfx.line(x1,y1,x2,y2);
        // inner glow
        gfx.stroke(colorWithAlpha(col,0.36)); gfx.strokeWeight(Math.max(1,sz*1.5)); gfx.line(x1,y1,x2,y2);
        // core
        gfx.stroke(colorWithAlpha(col,1)); gfx.strokeWeight(sz); gfx.line(x1,y1,x2,y2);
        gfx.pop();
      }

      // Draw a stroke (array of points) using neonLine for consistent layered glow
      function drawStrokeLayer(g, s){
        if(!s || !s.points || s.points.length<1) return;
        g.push(); g.noFill();
        if(s.points.length===1){ const p = s.points[0]; neonLine(g,p.x,p.y,p.x,p.y,s.color,s.size); g.pop(); return; }
        for(let i=0;i<s.points.length-1;i++){
          const a = s.points[i]; const b = s.points[i+1]; neonLine(g,a.x,a.y,b.x,b.y,s.color,s.size);
        }
        g.pop();
      }

      function colorWithAlpha(hex, a){
        // hex like #rrggbb
        const r = parseInt(hex.slice(1,3),16); const g = parseInt(hex.slice(3,5),16); const b = parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${b},${a})`;
      }

      // Particles: sparks and shard debris
      const sparks = [];
      const shards = [];
      const GRAVITY = 0.35;

      class Spark{
        constructor(x,y,color){
          this.x = x; this.y = y; this.r = Math.random()*2.5 + 1; this.life = 300 + Math.random()*300; this.age = 0; this.color = color;
          this.vx = (Math.random()-0.5)*2; this.vy = - (2 + Math.random()*4); // rise initially
        }
        update(dt){ this.vy += GRAVITY*0.3; this.x += this.vx; this.y += this.vy; this.age += dt; }
        draw(g){ const a = Math.max(0,1 - this.age/this.life); g.noStroke(); g.fill(colorWithAlpha(this.color, a)); g.ellipse(this.x,this.y,this.r*2); }
        alive(){ return this.age < this.life; }
      }

      class Shard{
        constructor(x,y,color){
          this.x = x; this.y = y; this.color = color; this.size = 6 + Math.random()*8; this.life = 1200 + Math.random()*800; this.age = 0;
          this.vx = (Math.random()-0.5)*6; this.vy = (Math.random()-0.2)*6; this.rotation = Math.random()*Math.PI*2; this.angular = (Math.random()-0.5)*0.3;
          this.sides = 3 + Math.floor(Math.random()*3); // 3-5
          // local polygon points
          this.poly = [];
          for(let i=0;i<this.sides;i++){ const ang = (i/this.sides)*Math.PI*2; const r = this.size*(0.4 + Math.random()*0.9); this.poly.push({x: Math.cos(ang)*r, y: Math.sin(ang)*r}); }
        }
        update(dt){ this.vy += GRAVITY*0.8; this.x += this.vx; this.y += this.vy; this.rotation += this.angular; this.age += dt; }
        draw(g){ const a = Math.max(0,1 - this.age/this.life); // layered neon glow for polygon edges
          // draw layered strokes for each edge
          g.push(); g.translate(this.x,this.y); g.rotate(this.rotation);
          for(let layer of [{w:6,a:0.06},{w:3,a:0.12},{w:1.5,a:0.36},{w:1,a:1}] ){
            g.noFill(); g.strokeWeight(layer.w); g.stroke(colorWithAlpha(this.color, layer.a * a));
            for(let i=0;i<this.poly.length;i++){ const A = this.poly[i]; const B = this.poly[(i+1)%this.poly.length]; g.line(A.x,A.y,B.x,B.y); }
          }
          // optional faint fill
          g.noStroke(); g.fill(colorWithAlpha(this.color, 0.08 * a)); g.beginShape(); for(let v of this.poly) g.vertex(v.x,v.y); g.endShape(g.CLOSE);
          g.pop();
        }
        alive(){ return this.age < this.life; }
      }

      function redrawBgLayer(){ if(!bgLayer) return; bgLayer.clear(); // draw all strokes
        for(const s of strokes){ drawStrokeLayer(bgLayer,s); }
      }

      function finishStroke(handKey){
        if(!activeStrokes[handKey]) return;
        delete activeStrokes[handKey];
        redrawBgLayer();
      }

      // Gesture helpers
      function isFingerUp(landmarks, tipIdx, pipIdx){ if(!landmarks) return false; return landmarks[tipIdx].y < landmarks[pipIdx].y; }
      function distancePx(a,b){ const A = toC(a); const B = toC(b); const dx = A.x-B.x, dy = A.y-B.y; return Math.sqrt(dx*dx+dy*dy); }

      // Start p5
      window.addEventListener('load', async function(){
        const sketch = (p) => {
          p.setup = function(){
            const stageEl = document.getElementById('stage');
            const w = Math.max(300, Math.floor(stageEl ? stageEl.clientWidth : p.windowWidth));
            const h = Math.max(200, Math.floor(stageEl ? stageEl.clientHeight : p.windowHeight));
            p.createCanvas(w,h).parent('draw'); p.pixelDensity(1);
            bgLayer = p.createGraphics(p.width,p.height); bgLayer.pixelDensity(1);
            video = document.getElementById('camera'); window._neonP5 = p; fitCanvas();
          };

          p.draw = function(){
            p.clear();
            // show persistent strokes
            if(bgLayer) p.image(bgLayer,0,0,p.width,p.height);

            // update and draw particles (sparks then shards) above persistent layer
            const dt = Math.max(16, p.deltaTime || 16);
            // sparks
            for(let i=sparks.length-1;i>=0;i--){ const sp = sparks[i]; sp.update(dt); if(!sp.alive()){ sparks.splice(i,1); } }
            // shards
            for(let i=shards.length-1;i>=0;i--){ const sh = shards[i]; sh.update(dt); if(!sh.alive()){ shards.splice(i,1); } }
            // draw shards behind sparks for layering
            p.push();
            for(const sh of shards){ sh.draw(p); }
            for(const sp of sparks){ sp.draw(p); }
            p.pop();

            // draw swatches rail on left (use centralized constants)
            const sw = SWATCH_SIZE, gap = SWATCH_GAP, left = SWATCH_LEFT, top = SWATCH_TOP;
            for(let i=0;i<SWATCHES.length;i++){
              const x = left; const y = top + i*(sw+gap);
              // base
              p.push();
              p.noStroke(); p.fill(SWATCHES[i]); p.rect(x,y,sw,sw,8);
              // active border
              if(SWATCHES[i]===activeColor){ p.stroke(255,255,255,220); p.strokeWeight(3); p.noFill(); p.rect(x-4,y-4,sw+8,sw+8,10); }
              p.pop();
            }

            // draw hover/dwell progress and finger cursors
            for(const key in handsState){ const hs = handsState[key]; if(!hs || !hs.indexTip) continue;
              const tip = hs.indexTip; p.push();
              // finger cursor
              p.noStroke(); p.fill(255,255,255,180); p.ellipse(tip.x,tip.y,8);
              // if hovering swatch, draw progress arc
              if(typeof hs.hoverSwatch === 'number'){
                const idx = hs.hoverSwatch; const x = left+sw/2; const y = top + idx*(sw+gap)+sw/2; const prog = Math.min(1, (Date.now()-hs.dwellStart)/SWATCH_DWELL);
                // glow ring
                p.noFill(); p.stroke(colorWithAlpha(SWATCHES[idx],0.9)); p.strokeWeight(6); p.ellipse(x,y,sw+18);
                // progress arc
                p.noFill(); p.stroke(255,255,255,220); p.strokeWeight(3);
                // use p5 instance constants to avoid relying on globals
                p.arc(x,y,sw+14,sw+14,-p.HALF_PI, -p.HALF_PI + p.TWO_PI*prog);
              }
              p.pop();
            }
          };

          p.windowResized = function(){ const stageEl = document.getElementById('stage'); const w = Math.max(300, Math.floor(stageEl ? stageEl.clientWidth : p.windowWidth)); const h = Math.max(200, Math.floor(stageEl ? stageEl.clientHeight : p.windowHeight)); p.resizeCanvas(w,h); if(bgLayer && bgLayer.resizeCanvas) bgLayer.resizeCanvas(w,h); fitCanvas(); };
        };
        new p5(sketch);

        // Initialize MediaPipe Hands
        hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 2, minDetectionConfidence: 0.75, minTrackingConfidence: 0.7 });

        hands.onResults(function(results){
          const p = window._neonP5;
          const statusLeft = document.getElementById('status-left');
          const landmarksList = results.multiHandLandmarks || [];
          const handednessList = results.multiHandedness || [];
          if(statusLeft) statusLeft.textContent = 'Status: hands:' + landmarksList.length;

          // reset handsState presence; we'll update for present hands
          const present = {};

          for(let i=0;i<landmarksList.length;i++){
            const lm = landmarksList[i]; const handLabel = (handednessList[i] && handednessList[i].label) ? handednessList[i].label : `H${i}`;
            present[handLabel]=true;
            const indexUp = isFingerUp(lm,8,6);
            const middleDown = !isFingerUp(lm,12,10);
            const open5 = isFingerUp(lm,8,6) && isFingerUp(lm,12,10) && isFingerUp(lm,16,14) && isFingerUp(lm,20,18);
            const fist = !open5 && (lm[8].y>lm[6].y && lm[12].y>lm[10].y);
            const pinchDist = distancePx(lm[4],lm[8]);
            const tipC = toC(lm[8]);

            // ensure state exists
            if(!handsState[handLabel]) handsState[handLabel] = { hoverSwatch: null, dwellStart: 0, prevFist:false, prevOpen5:false, pinchActive:false, pinchStroke:null, pinchLastPos:null };
            const hs = handsState[handLabel];
            // Capture previous fist/open state for transition detection
            hs.prevFist = !!hs.fist; hs.prevOpen5 = !!hs.open5;
            hs.landmarks = lm; hs.indexUp = indexUp; hs.middleDown = middleDown; hs.open5 = open5; hs.fist = fist; hs.pinchDist = pinchDist; hs.indexTip = { x: tipC.x, y: tipC.y };

            // Swatch hover detection (use centralized constants)
            const sw = SWATCH_SIZE, gap = SWATCH_GAP, left = SWATCH_LEFT, top = SWATCH_TOP;
            let hoverIdx = null;
            for(let si=0;si<SWATCHES.length;si++){
              const x = left; const y = top + si*(sw+gap);
              if(hs.indexTip.x >= x && hs.indexTip.x <= x+sw && hs.indexTip.y >= y && hs.indexTip.y <= y+sw){ hoverIdx = si; break; }
            }
            if(hoverIdx!==null){
              if(hs.hoverSwatch!==hoverIdx){ hs.hoverSwatch = hoverIdx; hs.dwellStart = Date.now(); }
              else{
                const elapsed = Date.now()-hs.dwellStart;
                if(elapsed>=SWATCH_DWELL){
                  // Explicit policy when multiple hands dwell: earliest completion wins; tie-break by hand label
                  const completion = hs.dwellStart + SWATCH_DWELL;
                  let earliestComp = completion; let earliestHand = handLabel;
                  for(const otherKey in handsState){ const o = handsState[otherKey]; if(o && typeof o.hoverSwatch === 'number'){
                    const oComp = o.dwellStart + SWATCH_DWELL;
                    if(oComp < earliestComp || (oComp === earliestComp && otherKey < earliestHand)){ earliestComp = oComp; earliestHand = otherKey; }
                  }}
                  if(earliestHand === handLabel){ activeColor = SWATCHES[hoverIdx]; }
                  hs.hoverSwatch = null; hs.dwellStart = 0;
                }
              }
            } else { hs.hoverSwatch = null; hs.dwellStart = 0; }

            // Pinch-based move: thumb & index proximity
            const pinchActive = pinchDist < PINCH_THRESHOLD;
            if(pinchActive && !hs.pinchActive){
              // start pinch: find nearest stroke point
              let nearest = null; let nd = Infinity;
              for(const s of strokes){
                for(const pt of s.points){ const d = Math.hypot(pt.x - hs.indexTip.x, pt.y - hs.indexTip.y); if(d < nd){ nd = d; nearest = s; } }
              }
              if(nearest && nd < 120){ hs.pinchActive = true; hs.pinchStroke = nearest; hs.pinchLastPos = { x: hs.indexTip.x, y: hs.indexTip.y }; }
            } else if(pinchActive && hs.pinchActive && hs.pinchStroke){
              // continue moving selected stroke by delta
              const dx = hs.indexTip.x - hs.pinchLastPos.x; const dy = hs.indexTip.y - hs.pinchLastPos.y;
              for(const pt of hs.pinchStroke.points){ pt.x += dx; pt.y += dy; }
              hs.pinchLastPos = { x: hs.indexTip.x, y: hs.indexTip.y };
              // rebuild persistent layer
              redrawBgLayer();
            } else if(!pinchActive && hs.pinchActive){
              hs.pinchActive = false; hs.pinchStroke = null; hs.pinchLastPos = null;
            }

            // Fist -> open5 shatter: detect transition
            if(hs.prevFist && hs.open5){
              // sample ~40 points from each stroke and spawn shards/sparks
              for(const s of strokes){
                const pts = s.points || [];
                const count = Math.min(40, Math.max(1, pts.length));
                const step = Math.max(1, Math.floor(pts.length / count));
                for(let pi=0; pi<pts.length; pi+=step){ const pt = pts[pi]; shards.push(new Shard(pt.x, pt.y, s.color)); if(Math.random()<0.6) sparks.push(new Spark(pt.x, pt.y, s.color)); }
              }
              // clear strokes and persistent layer
              strokes.length = 0; redrawBgLayer(); if(bgLayer) bgLayer.clear();
            }

            // Drawing: index-up AND middle-down required
            const drawing = indexUp && middleDown;
            const handKey = handLabel;
            if(drawing){
              // start stroke if not active
              if(!activeStrokes[handKey]){
                const newStroke = { id: 's' + (STROKE_COUNTER++), color: activeColor, size: DEFAULT_STROKE_SIZE, points: [], hand: handKey };
                strokes.push(newStroke); activeStrokes[handKey] = newStroke;
              }
              // append point
              const s = activeStrokes[handKey]; const pnt = { x: hs.indexTip.x, y: hs.indexTip.y };
              const pts = s.points; if(pts.length===0 || Math.hypot(pts[pts.length-1].x-pnt.x, pts[pts.length-1].y-pnt.y)>1){ pts.push(pnt); // draw latest segment to bgLayer for persistence
                if(bgLayer){ // draw a larger recent window to avoid flicker from tiny slices
                  drawStrokeLayer(bgLayer, { color: s.color, size: s.size, points: pts.slice(Math.max(0,pts.length-8)) }); }
              }
            } else {
              // finish stroke if exists
              finishStroke(handKey);
            }
          }

          // Clear handsState entries for hands no longer present
          for(const k in handsState){
            if(!present[k]){
              finishStroke(k);
              delete handsState[k];
            }
          }
        });

        // Start camera
        showLoading();
        try{
          const stream = await navigator.mediaDevices.getUserMedia({ video: { width:1280, height:720, facingMode:'user' }, audio:false });
          const cam = document.getElementById('camera'); if(!cam) throw new Error('Missing #camera element'); video = cam; cam.srcObject = stream; await cam.play();

          function processFrame(){ requestAnimationFrame(processFrame); if(video && hands){ try{ hands.send({ image: video }); }catch(e){} } }
          processFrame(); hideLoading(); window.neon.ready = true;
        }catch(err){ console.error('Camera startup failed', err); const statusLeft = document.getElementById('status-left'); if(statusLeft) statusLeft.textContent = 'Status: camera-error'; hideLoading(); }
      });
    })();
  </script>
</body>
</html>
